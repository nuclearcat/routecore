name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [1.88.0, stable, beta]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Build with default features
        run: cargo build --verbose --all

      - name: Build with all features
        run: cargo build --verbose --all --all-features

      - name: Test with default features
        run: cargo test --verbose --all

      - name: Test with all features
        run: cargo test --verbose --all --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install stable Rust with Clippy
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Run Clippy
        run: cargo clippy --all --all-features -- -D warnings

  minimal-versions:
    name: Minimal dependency versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Resolve minimal dependency versions
        run: cargo +nightly update -Z minimal-versions

      - name: Build with minimal dependency versions
        run: cargo +nightly build --verbose --all --all-features

      - name: Test with minimal dependency versions
        run: cargo +nightly test --verbose --all --all-features
